name: Multi-Platform Meson Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        backend: [blas, cuda, sycl]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: |
          git submodule sync --recursive
          git submodule update --init --recursive

      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      # ~~~      CACHING          ~~~
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      
      - name: Cache apt packages
        uses: actions/cache@v4
        with:
          path: /var/cache/apt/archives
          # Key updated to v3 due to changes in dependency installation methods
          key: ${{ runner.os }}-apt-${{ matrix.backend }}-v3
          restore-keys: |
            ${{ runner.os }}-apt-${{ matrix.backend }}-

      - name: Cache Meson build directory
        id: cache-builddir
        uses: actions/cache@v4
        with:
          path: builddir
          key: ${{ runner.os }}-${{ matrix.backend }}-build-${{ hashFiles('**/meson.build', '**/meson_options.txt') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.backend }}-build-${{ hashFiles('**/meson.build', '**/meson_options.txt') }}-
            ${{ runner.os }}-${{ matrix.backend }}-build-

      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      # ~~~ DEPENDENCY INSTALLATION ~~~
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

      - name: Install common dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build curl gpg

      - name: Install BLAS dependencies
        if: matrix.backend == 'blas'
        run: sudo apt-get install -y libblas-dev libopenblas-dev

      - name: Install CUDA dependencies
        if: matrix.backend == 'cuda'
        run: |
          # Correctly determine OS version for the URL
          if [ "${{ matrix.os }}" = "ubuntu-22.04" ]; then
            OS_VERSION="2204"
          elif [ "${{ matrix.os }}" = "ubuntu-24.04" ]; then
            OS_VERSION="2404"
          fi
          
          # Install CUDA from NVIDIA's repository for a specific version
          wget "https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${OS_VERSION}/x86_64/cuda-keyring_1.1-1_all.deb"
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-4
          rm cuda-keyring_1.1-1_all.deb

      - name: Install SYCL dependencies (Intel oneAPI)
        if: matrix.backend == 'sycl'
        run: |
          # Use modern, non-deprecated method for adding GPG key
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB | gpg --dearmor | sudo tee /etc/apt/keyrings/oneapi-archive-keyring.gpg > /dev/null
          
          # Add the oneAPI repository
          echo "deb [signed-by=/etc/apt/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          
          # Install required packages
          sudo apt-get install -y \
            intel-oneapi-dpcpp-cpp-2024.1 \
            intel-oneapi-mkl-devel \
            opencl-headers \
            ocl-icd-opencl-dev

      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      # ~~~    BUILD & CONFIGURE   ~~~
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

      - name: Configure Meson
        # Skip if build directory was restored from cache
        if: steps.cache-builddir.outputs.cache-hit != 'true'
        run: |
          MESON_CMD="meson setup --buildtype release builddir"

          if [ "${{ matrix.backend }}" == "sycl" ]; then
            # Source environment and create native file for SYCL
            source /opt/intel/oneapi/setvars.sh
            cat <<EOF > native.ini
            [binaries]
            c = '/opt/intel/oneapi/compiler/2024.1/bin/icx'
            cpp = '/opt/intel/oneapi/compiler/2024.1/bin/icpx'
            EOF
            # FIX: Removed erroneous 'gars' and Windows-specific 'b_vscrt=md' arguments
            $MESON_CMD -Dsycl=l0 -Dcpp_args=-fsycl -Dcpp_link_args=-fsycl --native-file native.ini
          elif [ "${{ matrix.backend }}" == "cuda" ]; then
            $MESON_CMD -Dcuda=true -Dcudnn=false
          else # blas
            $MESON_CMD -Dblas=true
          fi

      - name: Build with Ninja
        # Skip if build directory was restored from cache
        if: steps.cache-builddir.outputs.cache-hit != 'true'
        run: |
          if [ "${{ matrix.backend }}" == "sycl" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          ninja -C builddir

      - name: Upload Meson Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-log-${{ matrix.os }}-${{ matrix.backend }}
          path: builddir/meson-logs/meson-log.txt

      - name: Download Network
        # Check if file exists from cache before downloading
        if: "! test builddir/T79.pb.gz"
        run: |
          cd builddir
          curl -L https://training.lczero.org/get_network?sha=195b450999e874d07aea2c09fd0db5eff9d4441ec1ad5a60a140fe8ea94c4f3a -o T79.pb.gz

      - name: Update file timestamp
        run: touch -t 201801010000.00 builddir/T79.pb.gz

      - name: Run tests
        run: |
          if [ "${{ matrix.backend }}" == "sycl" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          ./builddir/lc0 benchmark --backend=${{ matrix.backend }} --num-positions=2 --task-workers=3 --minibatch-size=7 --threads=2

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lc0-${{ matrix.os }}-${{ matrix.backend }}
          path: builddir
