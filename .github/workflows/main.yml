name: Multi-Platform Meson Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04]
        backend: [blas, cuda, sycl]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Update submodules
        run: |
          git submodule sync --recursive 
          git submodule update --init --recursive

      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      # ~~~ DEPENDENCY INSTALLATION ~~~
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

      - name: Install common dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build curl

      - name: Install BLAS dependencies
        if: matrix.backend == 'blas'
        run: sudo apt-get install -y libblas-dev libopenblas-dev

      - name: Install CUDA dependencies
        if: matrix.backend == 'cuda'
        run: |
          # Install CUDA from NVIDIA's repository for a specific version
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu${{ matrix.os == 'ubuntu-22.04' && '2204' || '2404' }}/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-4
          rm cuda-keyring_1.1-1_all.deb

      - name: Install SYCL dependencies (Intel oneAPI)
        if: matrix.backend == 'sycl'
        run: |
          # Install Intel oneAPI DPC++ Compiler and dependencies
          wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
          echo "deb https://apt.repos.intel.com/oneapi all main" | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y \
            intel-oneapi-dpcpp-cpp-2024.1 \
            intel-oneapi-mkl-devel \
            opencl-headers \
            ocl-icd-opencl-dev

          # Verify icpx installation
          export ICPX=/opt/intel/oneapi/compiler/2024.1/bin/icpx
          if ! $ICPX --version; then
            echo "Error: icpx compiler not found!"
            exit 1
          fi
          $ICPX --version

      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
      # ~~~    BUILD & CONFIGURE   ~~~
      # ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

      - name: Configure Meson
        run: |
          # Source environment for SYCL if needed
          if [ "${{ matrix.backend }}" == "sycl" ]; then
            source /opt/intel/oneapi/setvars.sh
            export CXX=/opt/intel/oneapi/compiler/2024.1/bin/icx
          else
            export CXX=c++
          fi
          echo "Using CXX compiler: $CXX"
          $CXX --version

          # Create native.ini in the working directory
            cat <<EOF > ./native.ini
            [binaries]
            c = '/opt/intel/oneapi/compiler/2024.1/bin/icx'
            cpp = '/opt/intel/oneapi/compiler/2024.1/bin/icpx'
            EOF

          # Base command
          CMD="meson setup --buildtype release builddir"

          # Add flags based on backend
          if [ "${{ matrix.backend }}" == "blas" ]; then
            $CMD -Dblas=true
          elif [ "${{ matrix.backend }}" == "cuda" ]; then
            $CMD -Dcuda=true -Dcudnn=false
          elif [ "${{ matrix.backend }}" == "sycl" ]; then
            $CMD -Dsycl=l0 -Dcpp_args=-fsycl -Dcpp_link_args=-fsycl -Db_vscrt=md --native-file native.ini
          fi

      - name: Build with Ninja
        run: |
          if [ "${{ matrix.backend }}" == "sycl" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          ninja -C builddir

      - name: Upload Meson Log on Failure
        if: failure()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: meson-log-${{ matrix.os }}-${{ matrix.backend }}
          path: builddir/meson-logs/meson-log.txt

      - name: Download Network
        run: |
          cd builddir
          curl -L https://training.lczero.org/get_network?sha=195b450999e874d07aea2c09fd0db5eff9d4441ec1ad5a60a140fe8ea94c4f3a -o T79.pb.gz
          if [ ! -f T79.pb.gz ]; then
            echo "Error: Failed to download T79.pb.gz"
            exit 1
          fi

      - name: Update file timestamp
        run: touch -t 201801010000.00 builddir/T79.pb.gz

      - name: Run tests
        run: |
          if [ "${{ matrix.backend }}" == "sycl" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          ./builddir/lc0 benchmark --backend=${{ matrix.backend }} --num-positions=2 --task-workers=3 --minibatch-size=7 --threads=2

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@v4.4.3
        with:
          name: lc0-${{ matrix.os }}-${{ matrix.backend }}
          path: builddir
